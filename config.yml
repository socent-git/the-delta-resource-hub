backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "opportunities"
    label: "Funding Opportunities"
    folder: "_opportunities"
    create: true
    fields:
      - {label: "Name", name: "name", widget: "string"}
      - {label: "Type", name: "type", widget: "select", options: ["Fellowship", "Foundation", "Fund", "Prize", "Corporation"]}
      - {label: "Entity", name: "entity", widget: "select", options: ["Both", "Not for Profit", "For Profit"]}
      - {label: "Region", name: "region", widget: "string"}
      - {label: "Amount", name: "amount", widget: "string"}
      - {label: "URL", name: "url", widget: "string"}
      - label: "Sectors"
        name: "tags"
        widget: "select"
        multiple: true
        options: ["All", "Climate", "Livelihoods", "Education", "Health", "Agriculture", "Gender"]

  - name: "research"
    label: "Research & Readings"
    folder: "_research"
    create: true
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Category", name: "category", widget: "select", options: ["Agriculture & Water", "Funding & Grants", "M&E", "Operations", "Tech & AI", "Climate"]}
      - {label: "Description", name: "desc", widget: "text"}
      - {label: "Year", name: "date", widget: "string"}
      - {label: "URL", name: "url", widget: "string"}
      - label: "Tags"
        name: "tags"
        widget: "list"

  - name: "tools"
    label: "Tech & AI Tools"
    folder: "_tools"
    create: true
    fields:
      - {label: "Name", name: "name", widget: "string"}
      - {label: "Category", name: "cat", widget: "select", options: ["AI & Automation", "Project Management", "Data & M&E", "Communications", "Finance", "Design"]}
      - {label: "Pricing", name: "pricing", widget: "select", options: ["Free", "Discount", "Paid"]}
      - {label: "Description", name: "desc", widget: "text"}
      - {label: "URL", name: "url", widget: "string"}
      - label: "Tags"
        name: "tags"
        widget: "list"
